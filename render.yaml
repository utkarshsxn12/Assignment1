services:
  - type: web
    name: splitsync
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && node prisma/seed.js && npm run start
    envVars:
      - key: DATABASE_URL
        value: file:/var/data/dev.db
    disk:
      name: splitsync-sqlite-volume
      mountPath: /var/data
      sizeGB: 1
